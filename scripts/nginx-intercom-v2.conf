# nginx config for Intercom Dashboard v2.
# Replaces /etc/nginx/sites-enabled/intercom after v2 smoke-test.
# Legacy (port 3000) process stays running for rollback; not exposed publicly.

server {
    server_name dashboard-intercom.atomgroup.dev;

    # Export endpoint needs extended timeout for large datasets
    location /api/export {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/dashboard-intercom.atomgroup.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard-intercom.atomgroup.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# API subdomain: strips nothing — v2 already exposes everything under /api.
# `api.host/`                → v2 Swagger UI (Next route `/api`)
# `api.host/openapi.json`    → v2 spec       (Next route `/api/openapi.json`)
# `api.host/health`          → v2 health     (Next route `/api/health`, public)
# The previous `rewrite ^/(.*)$ /api/$1` + `= /docs` mapping from v1 has been
# removed since v2's routing already matches the desired external URL shape
# when we prepend /api via rewrite below.
server {
    server_name api.dashboard-intercom.atomgroup.dev;

    location / {
        rewrite ^/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /_next/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/dashboard-intercom.atomgroup.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard-intercom.atomgroup.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name dashboard-intercom.atomgroup.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name api.dashboard-intercom.atomgroup.dev;
    return 301 https://$host$request_uri;
}
